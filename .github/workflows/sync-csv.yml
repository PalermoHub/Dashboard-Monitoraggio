name: Sync CSV from Google Sheet

on:
  schedule:
    - cron: '00 12 * * 1-5'  # 12:00 UTC 
    - cron: '00 16 * * 1-5'  # 16:00 UTC
  workflow_dispatch:

jobs:
  sync-csv:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Download CSV from Google Sheet
      run: |
        SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRlCr9IBCVP3rpbY7YCGNFKR-mqjqejWSx2DqKPiWkHbf0Xe7PkJ0xM7pNyPCbetPdRiL9qq11YbYW4/pub?gid=318461464&single=true&output=csv"
        
        echo "📄 Scaricamento CSV da Google Sheets..."
        
        for i in {1..3}; do
          curl -L -s --fail \
            -H "User-Agent: Mozilla/5.0 (compatible; GitHub-Actions)" \
            -H "Accept: text/csv,application/csv,*/*" \
            -H "Cache-Control: no-cache" \
            "$SHEET_URL" -o new_monit_patti_pa.csv
            
          if [ $? -eq 0 ] && [ -s new_monit_patti_pa.csv ]; then
            break
          else
            echo "⚠️ Tentativo $i fallito, riprovo..."
            sleep 5
          fi
        done
        
        if [ ! -s new_monit_patti_pa.csv ]; then
          echo "❌ Errore: File CSV vuoto dopo tutti i tentativi"
          exit 1
        fi
        
        if grep -q -i "<html>\|<head>\|<body>" new_monit_patti_pa.csv; then
          echo "❌ Errore: Ricevuto HTML invece di CSV"
          echo "🔍 Contenuto ricevuto:"
          head -10 new_monit_patti_pa.csv
          exit 1
        fi
        
        LINES=$(wc -l < new_monit_patti_pa.csv)
        if [ "$LINES" -lt 1 ]; then
          echo "❌ CSV vuoto o invalido"
          exit 1
        fi
        
        echo "✅ CSV scaricato con successo"
        echo "📊 Righe totali: $LINES"
        echo "🔍 Prima riga:"
        head -1 new_monit_patti_pa.csv
        
    - name: Check for changes
      id: changes
      run: |
        mkdir -p dati
        
        if [ -f "dati/monit_patti_pa.csv" ]; then
          if cmp -s "dati/monit_patti_pa.csv" "new_monit_patti_pa.csv"; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "📊 Nessuna modifica rilevata"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "🔄 Modifiche rilevate"
          fi
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "🆕 Primo caricamento"
        fi
        
    - name: Backup and update files
      if: steps.changes.outputs.changes == 'true'
      run: |
        DATE=$(date -u +"%Y-%m-%d")
        TIME=$(date -u +"%H-%M")
        HOUR=$(date -u +"%H")
        
        mkdir -p "backups/$DATE"
        
        if [ -f "dati/monit_patti_pa.csv" ]; then
          BACKUP_FILE="backups/$DATE/monit_patti_pa_$TIME.csv"
          if [ ! -f "$BACKUP_FILE" ]; then
            cp "dati/monit_patti_pa.csv" "$BACKUP_FILE"
            echo "💾 Backup creato: $BACKUP_FILE"
          fi
        fi
        
        mv "new_monit_patti_pa.csv" "dati/monit_patti_pa.csv"
        echo "🔄 File principale aggiornato: dati/monit_patti_pa.csv"
        
        if [ "$HOUR" = "22" ]; then
          echo "🧹 Esecuzione serale - pulizia giornaliera..."
          LATEST_FILE=$(ls -t "backups/$DATE"/monit_patti_pa_*.csv 2>/dev/null | head -1)
          if [ -n "$LATEST_FILE" ]; then
            FILES_BEFORE=$(ls "backups/$DATE"/monit_patti_pa_*.csv 2>/dev/null | wc -l)
            find "backups/$DATE" -name "monit_patti_pa_*.csv" -not -path "$LATEST_FILE" -delete
            echo "✅ Pulizia completata. Mantenuto solo: $(basename "$LATEST_FILE")"
            echo "🗑️ Rimossi $(($FILES_BEFORE - 1)) file precedenti"
          fi
        else
          echo "📋 Esecuzione pomeridiana - backup mantenuto"
        fi
        
    - name: Commit and push changes to main
      if: steps.changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add .
        git commit -m "🔄 Aggiornamento monit_patti_pa.csv $(date -u '+%Y-%m-%d %H:%M UTC')"
        git push
        
        echo "✅ Modifiche salvate su main"

    - name: No changes
      if: steps.changes.outputs.changes == 'false'
      run: |
        echo "ℹ️ Nessuna modifica da salvare"
        rm -f new_monit_patti_pa.csv

    # ── Sempre eseguito: sincronizza dati/ su gh-pages ──────────────────────
    - name: Deploy dati/ to gh-pages
      run: |
        echo "🚀 Sincronizzazione cartella dati/ su gh-pages..."

        # Salva il contenuto aggiornato di dati/ fuori dal repo
        mkdir -p /tmp/dati_deploy
        cp -r dati/. /tmp/dati_deploy/

        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        # Fetch e checkout di gh-pages
        git fetch origin gh-pages
        git checkout gh-pages

        # Ricrea la cartella dati e copia i file
        mkdir -p dati
        cp -r /tmp/dati_deploy/. dati/

        git add dati/

        # Commit solo se ci sono effettive differenze (funziona anche al primo deploy)
        if [ -n "$(git status --porcelain dati/)" ]; then
          git commit -m "🔄 Sync dati/ da main $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages
          echo "✅ Cartella dati/ aggiornata su gh-pages"
        else
          echo "ℹ️ Nessuna differenza su gh-pages, nulla da pushare"
        fi

        # Torna su main
        git checkout main
    # ────────────────────────────────────────────────────────────────────────
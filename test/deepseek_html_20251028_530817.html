<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabs A B C</title>
    <style>
        /* Stile generale per le tabs */
        .tabs-container {
          position: absolute;
    right: 0px;
    top: 0;
    bottom: 0;
    width: 320px;
    max-width: 40%;
    background: var(--color-white);
    box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
    z-index: 1200;
    display: flex;
    flex-direction: column;
    transition: right 0.4s 
    cubic-bezier(0.16, 1, 0.3, 1);
    border-left: 1px solid var(--border-color);
    overflow-y: auto;
        }

        .tabs {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            margin-right: 5px;
            border-radius: 5px 5px 0 0;
            background-color: #f1f1f1;
            transition: background-color 0.3s;
        }

        .tab:hover {
            background-color: #ddd;
        }

        .tab.active {
            background-color: white;
            border-color: #ddd;
            border-bottom: 1px solid white;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            padding: 20px;
            border: 1px solid #ddd;
            border-top: none;
            background-color: white;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="tabs-container">
        <ul class="tabs">
            <li class="tab active" data-tab="A">Statistiche</li>
            <li class="tab" data-tab="B">DataViz</li>
            <li class="tab" data-tab="C">Dettagli</li>
        </ul>

        <div class="tab-content active" id="A">
            <h2>Contenuto Tab A</h2>
            <p>Questo è il contenuto della tab A</p>
        </div>

        <div class="tab-content" id="B">
            <h2>Contenuto Tab B</h2>
            <p>Questo è il contenuto della tab B</p>
        </div>

        <div class="tab-content" id="C">
            <h2>Contenuto Tab C</h2>
            <p>Questo è il contenuto della tab C</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.tab');
            
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // Rimuove la classe active da tutte le tab e contenuti
                    document.querySelectorAll('.tab').forEach(t => {
                        t.classList.remove('active');
                    });
                    document.querySelectorAll('.tab-content').forEach(c => {
                        c.classList.remove('active');
                    });

                    // Aggiunge la classe active alla tab cliccata
                    tab.classList.add('active');
                    
                    // Mostra il contenuto correlato
                    const tabId = tab.getAttribute('data-tab');
                    document.getElementById(tabId).classList.add('active');
                });
            });
        });
    </script>
</body>
</html>
